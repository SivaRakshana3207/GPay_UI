<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPay</title>
  <link rel="shortcut icon" href="./assets/logo.svg" type="image/x-icon">

  <!-- Tailwind CSS -->
  <link href="./dist/output.css" rel="stylesheet">
</head>
<body class="m-0 p-0 max-w-md mx-auto">
    <!-- Header -->
    <div class="p-4 flex justify-evenly items-center bg-[#B1E7FB]">
        <div class="relative">
            <input type="text" placeholder="Pay friends and merchants" style="outline: none;" class="px-10 py-3 w-[300px] bg-gray-50 rounded-full ">
            <img src="./assets/search.png" alt="" class="absolute left-4 bottom-3.5">
        </div>
        <div>
            <img src="./assets/siva.jpeg" alt="" class="rounded-full w-12 h-12 object-cover">
        </div>
    </div>

    <!-- Banner -->
    <div class="bg-[#B1E7FB] relative">
        <img src="./assets/home-bg.svg" alt="">
        <div class="absolute top-4 left-10 space-y-3">
            <h4 class="text-xl font-sans">Safe, simple <br> flexible loans</h4>
            <small class="text-sm text-blue-800"><a href="">Apply now</a></small>
        </div>
    </div>
</body>
</html>
